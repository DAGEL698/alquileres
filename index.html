<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Dashboard Alquileres Nube</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar para la tabla suave en celular */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #16192b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #34384e; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d946ef; }
    </style>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para traducir el código -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Para conectar a la Nube) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#16192b] text-slate-200 font-sans selection:bg-fuchsia-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        // TUS CLAVES DE FIREBASE OFICIALES
        const firebaseConfig = {
            apiKey: "AIzaSyCQF0zxPAkr6Txdz94HRmDzmag1YqEDSEg",
            authDomain: "mi-dashboard-alquileres.firebaseapp.com",
            projectId: "mi-dashboard-alquileres",
            storageBucket: "mi-dashboard-alquileres.firebasestorage.app",
            messagingSenderId: "323869241018",
            appId: "1:323869241018:web:dd2db6fa90153746b65c83"
        };

        let db = null;
        let auth = null;
        let isCloudConnected = false;

        if (firebaseConfig.apiKey !== "") {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                } else {
                    firebase.app(); 
                }
                db = firebase.firestore();
                auth = firebase.auth();
                isCloudConnected = true;
            } catch (error) {
                console.error("Error iniciando Firebase:", error);
            }
        }

        const { useState, useMemo, useEffect } = React;

        const defaultInitialData = [
          { id: '1', mes: 'Febrero', dia: 1, alquilerMexico: 238, alquiler6Agosto: 52, metodoPago: 'Transferencia QR', pagado: false },
          { id: '2', mes: 'Febrero', dia: 2, alquilerMexico: 238, alquiler6Agosto: 52, metodoPago: 'Transferencia QR', pagado: false },
          { id: '10', mes: 'Marzo', dia: 1, alquilerMexico: 250, alquiler6Agosto: 60, metodoPago: 'Efectivo', pagado: true }
        ];

        function App() {
            const [data, setData] = useState([]);
            
            // ESTADOS PARA LA LISTA DE NOTAS
            const [notasGenerales, setNotasGenerales] = useState([]);
            const [nuevaNota, setNuevaNota] = useState('');
            
            const [isLoading, setIsLoading] = useState(true);
            const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            const isLocalFile = window.location.protocol === 'file:';
            const [connectionStatus, setConnectionStatus] = useState(isLocalFile ? '❌ Nube Bloqueada (Local)' : (isCloudConnected ? '☁️ Conectando...' : '💻 Modo Local'));
            const unsavedRef = React.useRef(false);

            useEffect(() => {
                const failsafeTimer = setTimeout(() => {
                    setConnectionStatus('⚠️ Red Bloqueada (Local)');
                    cargarLocal();
                }, 3500);

                function cargarLocal() {
                    try {
                        const localData = localStorage.getItem('dashboard_alquileres_archivo');
                        if (localData) {
                            setData(JSON.parse(localData));
                        } else {
                            setData(defaultInitialData);
                        }
                        // Cargar notas locales
                        const localNotas = localStorage.getItem('dashboard_notas_lista');
                        if (localNotas) {
                            try { setNotasGenerales(JSON.parse(localNotas)); } 
                            catch (e) { setNotasGenerales([]); }
                        }
                    } catch (e) {
                        setData(defaultInitialData);
                    } finally {
                        setIsLoading(false);
                        clearTimeout(failsafeTimer);
                    }
                }

                if (isCloudConnected && !isLocalFile) {
                    auth.signInAnonymously().then(() => {
                        // Sincronizar tabla de alquileres
                        db.collection("alquileres").onSnapshot((snapshot) => {
                            clearTimeout(failsafeTimer);
                            setConnectionStatus('☁️ Nube Conectada');
                            
                            if (unsavedRef.current) return;

                            if (snapshot.empty) {
                                setData(defaultInitialData);
                                setIsLoading(false);
                            } else {
                                const fetchedData = snapshot.docs.map(d => d.data());
                                fetchedData.sort((a, b) => Number(a.id) - Number(b.id));
                                setData(fetchedData);
                                setIsLoading(false);
                            }
                        }, (error) => {
                            clearTimeout(failsafeTimer);
                            setConnectionStatus('⚠️ Error de Nube');
                            cargarLocal();
                        });

                        // Sincronizar Notas Generales
                        db.collection("configuracion").doc("notasLista").onSnapshot((docSnap) => {
                            if (unsavedRef.current) return;
                            if (docSnap.exists) {
                                setNotasGenerales(docSnap.data().lista || []);
                            }
                        });
                    }).catch(error => {
                        clearTimeout(failsafeTimer);
                        setConnectionStatus('⚠️ Error de Sesión');
                        cargarLocal(); 
                    });
                } else {
                    cargarLocal();
                }

                return () => clearTimeout(failsafeTimer);
            }, []);

            const mesesDisponibles = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            const [selectedMonth, setSelectedMonth] = useState(() => {
                return localStorage.getItem('dashboard_ultimo_mes') || 'Febrero';
            });
            const currentYear = new Date().getFullYear();

            const monthIndex = mesesDisponibles.indexOf(selectedMonth);
            const daysInMonth = new Date(currentYear, monthIndex + 1, 0).getDate();
            const firstDayOfWeek = (new Date(currentYear, monthIndex, 1).getDay() + 6) % 7;

            const filteredData = useMemo(() => {
                return data.filter(row => row.mes === selectedMonth);
            }, [data, selectedMonth]);

            const handleEdit = (id, field, value) => {
                let parsedValue = value;
                if (field === 'alquilerMexico' || field === 'alquiler6Agosto' || field === 'dia') {
                    parsedValue = parseFloat(value) || 0;
                }
                
                setData(prevData =>
                    prevData.map(row => {
                        if (row.id === id) {
                            const updatedRow = { ...row, [field]: parsedValue };
                            
                            if (field === 'dia' && parsedValue > 0 && parsedValue <= 31) {
                                const mesIdx = mesesDisponibles.indexOf(updatedRow.mes);
                                const dateObj = new Date(currentYear, mesIdx, parsedValue);
                                const dayOfWeek = dateObj.getDay(); 
                                
                                const preciosMexico = { 1: 238, 2: 238, 3: 288, 4: 338, 5: 538, 6: 538, 0: 238 };
                                updatedRow.alquilerMexico = preciosMexico[dayOfWeek];

                                const diasDelMes = new Date(currentYear, mesIdx + 1, 0).getDate();
                                const calculo6Agosto = (900 / diasDelMes) + 23;
                                updatedRow.alquiler6Agosto = parseFloat(calculo6Agosto.toFixed(2));
                            }
                            return updatedRow;
                        }
                        return row;
                    })
                );
                
                setHasUnsavedChanges(true);
                setShowSuccess(false);
                unsavedRef.current = true;
            };

            const handleAddRow = () => {
                const newId = Date.now().toString();
                const newRow = { id: newId, mes: selectedMonth, dia: '', alquilerMexico: 0, alquiler6Agosto: 0, metodoPago: '', pagado: false };
                setData([...data, newRow]);
                setHasUnsavedChanges(true);
                setShowSuccess(false);
                unsavedRef.current = true;
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    e.target.blur(); 
                    handleSave(); 
                }
            };

            // FUNCIÓN: Añadir una nota a la lista al dar Enter
            const handleAddNota = (e) => {
                if (e.key === 'Enter' && nuevaNota.trim() !== '') {
                    e.preventDefault();
                    const nuevaLista = [...notasGenerales, { id: Date.now().toString(), text: nuevaNota.trim() }];
                    setNotasGenerales(nuevaLista);
                    setNuevaNota('');
                    setHasUnsavedChanges(true);
                    setShowSuccess(false);
                    unsavedRef.current = true;
                }
            };

            // FUNCIÓN: Borrar una nota de la lista
            const handleEliminarNota = (idBorrar) => {
                const nuevaLista = notasGenerales.filter(nota => nota.id !== idBorrar);
                setNotasGenerales(nuevaLista);
                setHasUnsavedChanges(true);
                setShowSuccess(false);
                unsavedRef.current = true;
            };

            const handleSave = async () => {
                setIsSaving(true);
                setShowSuccess(false);
                let guardadoNube = false;
                
                try {
                    localStorage.setItem('dashboard_alquileres_archivo', JSON.stringify(data));
                    localStorage.setItem('dashboard_notas_lista', JSON.stringify(notasGenerales));
                } catch (e) {}

                if (isLocalFile) {
                    setIsSaving(false); setHasUnsavedChanges(false); unsavedRef.current = false; return;
                }

                if (isCloudConnected && connectionStatus === '☁️ Nube Conectada') {
                    try {
                        const batch = db.batch();
                        
                        data.forEach(row => {
                            const docRef = db.collection("alquileres").doc(row.id.toString());
                            batch.set(docRef, row, { merge: true });
                        });

                        const notesRef = db.collection("configuracion").doc("notasLista");
                        batch.set(notesRef, { lista: notasGenerales }, { merge: true });

                        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("TIMEOUT")), 15000));
                        await Promise.race([batch.commit(), timeoutPromise]);
                        guardadoNube = true;
                    } catch (err) {
                        alert("⚠️ Error en Firebase. Revisa tu internet o la Base de Datos.");
                    }
                } else {
                    guardadoNube = true;
                }
                
                setIsSaving(false);
                if (guardadoNube) {
                    setShowSuccess(true);
                    setHasUnsavedChanges(false);
                    unsavedRef.current = false;
                    setTimeout(() => setShowSuccess(false), 3000);
                }
            };

            const metrics = useMemo(() => {
                let totalMexico = 0; let total6Agosto = 0; let totalPagado = 0; let totalPendiente = 0; let maxVal = 0;
                filteredData.forEach(row => {
                    const mexico = Number(row.alquilerMexico) || 0;
                    const agosto = Number(row.alquiler6Agosto) || 0;
                    const sumaDia = mexico + agosto;
                    totalMexico += mexico; total6Agosto += agosto;
                    if (row.pagado) totalPagado += sumaDia;
                    else totalPendiente += sumaDia;
                    if (sumaDia > maxVal) maxVal = sumaDia;
                });
                const totalGeneral = totalMexico + total6Agosto;
                return { totalMexico, total6Agosto, totalGeneral, totalPagado, totalPendiente, maxVal };
            }, [filteredData]);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#16192b]">
                        <div className="text-center font-bold text-xl text-fuchsia-400 animate-pulse">
                            Cargando Dashboard Neón...
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 bg-[#16192b]">
                    <div className="p-3 sm:p-4 md:p-6 max-w-7xl mx-auto space-y-5 sm:space-y-6">
                        
                        {/* Header */}
                        <header className="flex flex-col xl:flex-row items-start xl:items-center justify-between bg-[#222538] p-4 sm:p-6 rounded-3xl shadow-lg border border-[#34384e] gap-4 mt-2">
                            <div className="w-full xl:w-auto text-center xl:text-left">
                                <h1 className="text-2xl font-bold text-white flex items-center justify-center xl:justify-start gap-2">
                                    CRM Dashboard
                                </h1>
                                <p className="text-slate-400 text-sm mt-1">Control de Alquileres · Diseño Neón</p>
                            </div>
                            <div className="flex flex-col sm:flex-row flex-wrap items-center gap-3 w-full xl:w-auto">
                                <div className={`flex items-center justify-center w-full sm:w-auto gap-2 px-3 py-2 rounded-xl text-sm font-semibold ${connectionStatus.includes('Nube Conectada') ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20' : 'bg-orange-500/10 text-orange-400 border border-orange-500/20'}`}>
                                    {connectionStatus}
                                </div>
                                
                                <button
                                    onClick={handleSave}
                                    disabled={(!hasUnsavedChanges && !isSaving) || showSuccess}
                                    className={`flex items-center justify-center w-full sm:w-auto gap-2 px-6 py-2.5 rounded-xl font-bold transition-all text-base sm:text-sm shadow-lg ${
                                        isSaving ? 'bg-[#3a3f58] text-white cursor-wait' : 
                                        showSuccess ? 'bg-gradient-to-r from-emerald-400 to-teal-500 text-white' :
                                        hasUnsavedChanges ? 'bg-gradient-to-r from-fuchsia-500 to-purple-600 hover:opacity-90 text-white cursor-pointer shadow-fuchsia-500/20' : 
                                        'bg-[#2a2d43] text-slate-500 cursor-not-allowed border border-[#34384e]'
                                    }`}
                                >
                                    {isSaving ? '⏳ Procesando...' : showSuccess ? '✅ ¡Guardado!' : '💾 Guardar Cambios'}
                                </button>

                                <div className="flex items-center justify-between sm:justify-start w-full sm:w-auto gap-2 bg-[#16192b] border border-[#34384e] px-4 py-2 rounded-xl">
                                    <span className="text-slate-400">📅</span>
                                    <select 
                                        value={selectedMonth} 
                                        onChange={(e) => {
                                            setSelectedMonth(e.target.value);
                                            localStorage.setItem('dashboard_ultimo_mes', e.target.value);
                                        }} 
                                        className="bg-transparent font-bold text-white outline-none cursor-pointer w-full text-base sm:text-sm"
                                    >
                                        {mesesDisponibles.map(mes => <option key={mes} value={mes} className="bg-[#16192b] text-white">{mes}</option>)}
                                    </select>
                                </div>
                            </div>
                        </header>

                        {/* Tarjetas Superiores */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <div className="bg-gradient-to-br from-fuchsia-400 via-fuchsia-500 to-purple-600 p-6 rounded-3xl shadow-lg shadow-fuchsia-500/20 flex flex-col gap-2 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-10 -mt-10 blur-xl"></div>
                                <div className="text-white/80 font-medium text-sm">📍 Total México</div>
                                <p className="text-3xl font-bold text-white">${metrics.totalMexico.toLocaleString()}</p>
                            </div>
                            
                            <div className="bg-gradient-to-br from-cyan-400 via-cyan-500 to-blue-600 p-6 rounded-3xl shadow-lg shadow-cyan-500/20 flex flex-col gap-2 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-10 -mt-10 blur-xl"></div>
                                <div className="text-white/80 font-medium text-sm">📍 Total 6 de Agosto</div>
                                <p className="text-3xl font-bold text-white">${metrics.total6Agosto.toLocaleString()}</p>
                            </div>

                            <div className="bg-[#222538] p-6 rounded-3xl shadow-lg border border-[#34384e] flex flex-col justify-center gap-2 relative overflow-hidden group hover:border-cyan-500/50 transition-colors">
                                <div className="flex items-center gap-2 text-cyan-400 font-medium text-sm">
                                    <div className="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_rgba(34,211,238,0.8)]"></div>
                                    Dinero Pagado
                                </div>
                                <p className="text-2xl font-bold text-white">${metrics.totalPagado.toLocaleString()}</p>
                            </div>
                            
                            <div className="bg-[#222538] p-6 rounded-3xl shadow-lg border border-[#34384e] flex flex-col justify-center gap-2 relative overflow-hidden group hover:border-fuchsia-500/50 transition-colors">
                                <div className="flex items-center gap-2 text-fuchsia-400 font-medium text-sm">
                                    <div className="w-2 h-2 rounded-full bg-fuchsia-400 shadow-[0_0_8px_rgba(217,70,239,0.8)]"></div>
                                    Pendiente por Pagar
                                </div>
                                <p className="text-2xl font-bold text-white">${metrics.totalPendiente.toLocaleString()}</p>
                            </div>
                        </div>

                        {/* Calendario */}
                        <div className="bg-[#222538] p-6 rounded-3xl shadow-lg border border-[#34384e]">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                                <h2 className="text-lg font-bold text-white">Tickets & Calendario</h2>
                                <div className="flex flex-wrap gap-3 text-xs font-medium">
                                    <div className="flex items-center gap-1.5 text-slate-300"><div className="w-2 h-2 rounded-full bg-cyan-400"></div> Efectivo</div>
                                    <div className="flex items-center gap-1.5 text-slate-300"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Transferencia</div>
                                    <div className="flex items-center gap-1.5 text-slate-300"><div className="w-2 h-2 rounded-full bg-fuchsia-500"></div> Falta Pagar</div>
                                    <div className="flex items-center gap-1.5 text-slate-300"><div className="w-2 h-2 rounded-full bg-slate-500"></div> Descanso</div>
                                </div>
                            </div>
                            <div className="grid grid-cols-7 gap-2 sm:gap-4">
                                {['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].map(day => <div key={day} className="text-center text-xs font-bold text-slate-500 pb-2">{day}</div>)}
                                {Array.from({ length: firstDayOfWeek }).map((_, i) => <div key={`empty-${i}`} className="p-2 border border-transparent"></div>)}
                                {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(dia => {
                                    const dayRecords = filteredData.filter(d => d.dia === dia);
                                    let bgClass = 'bg-[#16192b] border-[#2a2d43] text-slate-500';
                                    let icon = null; let amountText = '';

                                    if (dayRecords.length > 0) {
                                        const record = dayRecords[0]; 
                                        const textMetodo = (record.metodoPago || '').toUpperCase();
                                        const totalDia = (Number(record.alquilerMexico) || 0) + (Number(record.alquiler6Agosto) || 0);
                                        
                                        if (textMetodo.includes('NO SALI')) { 
                                            bgClass = 'bg-[#2a2d43] border-[#3a3f58] text-slate-400'; 
                                            icon = <span className="text-xl">☕</span>; 
                                            amountText = 'Descanso'; 
                                        }
                                        else if (!record.pagado) { 
                                            bgClass = 'bg-fuchsia-500/10 border-fuchsia-500/30 text-fuchsia-400'; 
                                            icon = <span className="text-xl font-bold drop-shadow-[0_0_8px_rgba(217,70,239,0.8)]">✘</span>; 
                                            amountText = `$${totalDia}`; 
                                        }
                                        else if (textMetodo.includes('EFECTIVO')) { 
                                            bgClass = 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400'; 
                                            icon = <span className="text-xl">💵</span>; 
                                            amountText = `$${totalDia}`;
                                        }
                                        else if (textMetodo.includes('TRANSFERENCIA')) { 
                                            bgClass = 'bg-blue-500/10 border-blue-500/30 text-blue-400'; 
                                            icon = <span className="text-xl">📱</span>; 
                                            amountText = `$${totalDia}`;
                                        } 
                                        else { 
                                            bgClass = 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400'; 
                                            icon = <span className="text-xl">✅</span>; 
                                            amountText = `$${totalDia}`; 
                                        }
                                    }

                                    return (
                                        <div key={dia} className={`flex flex-col items-center justify-center p-2 rounded-2xl border ${bgClass} transition-all hover:scale-105 min-h-[70px] sm:min-h-[80px]`}>
                                            <span className="text-xs font-bold mb-1 opacity-80">{dia}</span>
                                            {icon && <div className="mb-1">{icon}</div>}
                                            {amountText && <span className="text-[10px] sm:text-xs font-semibold text-center leading-tight truncate w-full">{amountText}</span>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Tabla Editable SIN LA COLUMNA DE NOTAS */}
                        <div className="bg-[#222538] rounded-3xl shadow-lg border border-[#34384e] overflow-hidden">
                            <div className="p-4 sm:p-6 border-b border-[#34384e] bg-[#222538] flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <h2 className="text-lg font-bold text-white flex items-center justify-center sm:justify-start gap-2">Data Status / {selectedMonth}</h2>
                                <button onClick={handleAddRow} className="w-full sm:w-auto px-5 py-3 sm:py-2.5 bg-[#2a2d43] border border-[#34384e] text-white text-base sm:text-sm font-semibold rounded-xl hover:bg-[#34384e] transition-colors shadow-sm">
                                    + Añadir Registro
                                </button>
                            </div>
                            <div className="overflow-x-auto pb-2 custom-scrollbar">
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead>
                                        <tr className="bg-[#16192b]/50 text-slate-400 text-xs uppercase tracking-wider border-b border-[#34384e]">
                                            <th className="p-4 font-semibold">Mes</th>
                                            <th className="p-4 font-semibold">Día</th>
                                            <th className="p-4 font-semibold text-fuchsia-400">México</th>
                                            <th className="p-4 font-semibold text-cyan-400">6 De Agosto</th>
                                            <th className="p-4 font-semibold">Método</th>
                                            <th className="p-4 font-semibold text-center">Pagado</th>
                                            <th className="p-4 font-semibold text-right">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-[#34384e]/50">
                                        {filteredData.map((row) => {
                                            const totalDia = (Number(row.alquilerMexico) || 0) + (Number(row.alquiler6Agosto) || 0);
                                            return (
                                                <tr key={row.id} className={`transition-colors hover:bg-[#2a2d43]/50 ${row.pagado ? 'bg-cyan-500/5' : ''}`}>
                                                    <td className="p-2 w-32"><div className="w-full p-2.5 text-sm sm:text-sm text-slate-400 font-medium bg-[#16192b] rounded-xl select-none">{row.mes}</div></td>
                                                    <td className="p-2 w-20"><input type="number" value={row.dia} onChange={(e) => handleEdit(row.id, 'dia', e.target.value)} onKeyDown={handleKeyDown} className="w-full p-2.5 bg-[#16192b] border border-[#34384e] rounded-xl focus:border-fuchsia-500 outline-none text-base sm:text-sm text-center text-white font-medium"/></td>
                                                    <td className="p-2 w-28"><input type="number" value={row.alquilerMexico} onChange={(e) => handleEdit(row.id, 'alquilerMexico', e.target.value)} onKeyDown={handleKeyDown} className="w-full p-2.5 bg-[#16192b] border border-[#34384e] rounded-xl focus:border-fuchsia-500 outline-none text-base sm:text-sm text-fuchsia-400 font-bold"/></td>
                                                    <td className="p-2 w-28"><input type="number" value={row.alquiler6Agosto} onChange={(e) => handleEdit(row.id, 'alquiler6Agosto', e.target.value)} onKeyDown={handleKeyDown} className="w-full p-2.5 bg-[#16192b] border border-[#34384e] rounded-xl focus:border-cyan-500 outline-none text-base sm:text-sm text-cyan-400 font-bold"/></td>
                                                    <td className="p-2 w-48">
                                                        <select value={row.metodoPago} onChange={(e) => handleEdit(row.id, 'metodoPago', e.target.value)} onKeyDown={handleKeyDown} className={`w-full p-2.5 bg-[#16192b] border border-[#34384e] rounded-xl outline-none text-base sm:text-sm font-medium text-white cursor-pointer ${row.metodoPago.includes('FALTA') ? 'border-fuchsia-500/50 text-fuchsia-400' : ''}`}>
                                                            <option value="" className="bg-[#16192b]">Seleccionar...</option>
                                                            <option value="Transferencia QR" className="bg-[#16192b]">Transferencia QR</option>
                                                            <option value="Efectivo" className="bg-[#16192b]">Efectivo</option>
                                                            <option value="FALTA PAGAR" className="bg-[#16192b] text-fuchsia-400">FALTA PAGAR</option>
                                                            <option value="NO SALI" className="bg-[#16192b]">NO SALI</option>
                                                        </select>
                                                    </td>
                                                    <td className="p-2 text-center">
                                                        <input type="checkbox" checked={row.pagado} onChange={(e) => handleEdit(row.id, 'pagado', e.target.checked)} onKeyDown={handleKeyDown} className="w-7 h-7 sm:w-5 sm:h-5 accent-cyan-500 cursor-pointer rounded bg-[#16192b] border-[#34384e]"/>
                                                    </td>
                                                    <td className="p-4 text-right font-bold text-white whitespace-nowrap">${totalDia}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* NUEVO: SECCIÓN DE NOTAS TIPO LISTA DE TAREAS */}
                        <div className="bg-[#222538] p-4 sm:p-6 rounded-3xl shadow-lg border border-[#34384e]">
                            <h2 className="text-lg font-bold text-white flex items-center gap-2 mb-4">
                                📝 Notas y Pendientes
                            </h2>
                            
                            <input
                                type="text"
                                value={nuevaNota}
                                onChange={(e) => setNuevaNota(e.target.value)}
                                onKeyDown={handleAddNota}
                                placeholder="Escribe un apunte y presiona ENTER para agregarlo..."
                                className="w-full p-3 sm:p-4 mb-4 bg-[#16192b] border border-[#34384e] rounded-xl focus:border-fuchsia-500 outline-none text-base sm:text-sm text-white transition-colors"
                            />

                            <div className="space-y-3">
                                {notasGenerales.map((nota) => (
                                    <div key={nota.id} className="flex items-center justify-between p-3 sm:p-4 bg-[#16192b] border border-[#34384e] rounded-xl group hover:border-cyan-500/50 transition-colors">
                                        <div className="flex items-center gap-3 text-slate-300 text-sm">
                                            <span className="text-fuchsia-400 text-lg leading-none">❖</span>
                                            {nota.text}
                                        </div>
                                        <button 
                                            onClick={() => handleEliminarNota(nota.id)}
                                            className="text-slate-500 hover:text-red-400 md:opacity-0 group-hover:opacity-100 transition-opacity p-1"
                                            title="Eliminar apunte"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path>
                                            </svg>
                                        </button>
                                    </div>
                                ))}
                                {notasGenerales.length === 0 && (
                                    <div className="text-center text-slate-500 text-sm py-4">
                                        No hay notas. Escribe algo en la barra de arriba.
                                    </div>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
